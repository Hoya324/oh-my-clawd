<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessory Collection — oh-my-clawd</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .pixel-canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    @keyframes walk {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .animated { animation: walk 0.6s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html">Home</a>
      <a href="collection.html" class="active">Accessory Collection</a>
    </nav>

    <h1>Accessory Collection</h1>
    <p>9 unique accessories for Clawd. Unlock them through your Claude Code usage!</p>

    <div class="pet-grid" id="accessory-grid"></div>

    <footer>
      oh-my-clawd — <a href="https://github.com/Hoya324/oh-my-clawd">github.com/Hoya324/oh-my-clawd</a>
    </footer>
  </div>

  <script>
    const ACCESSORIES = [
      // Hats
      { id: 'cap',        name: 'Cap',          nameKo: '캡모자',      unlock: '10 sessions',             category: 'hat',     color: '#D97757' },
      { id: 'partyHat',   name: 'Party Hat',    nameKo: '꼬깔모자',    unlock: '5 hours total usage',     category: 'hat',     color: '#FF6B9D' },
      { id: 'santaHat',   name: 'Santa Hat',    nameKo: '산타모자',    unlock: '500K tokens used',        category: 'hat',     color: '#CC0000' },
      { id: 'silkHat',    name: 'Silk Hat',     nameKo: '실크햇',      unlock: '50 agent runs',           category: 'hat',     color: '#1A1A2E' },
      { id: 'cowboyHat',  name: 'Cowboy Hat',   nameKo: '카우보이모자', unlock: '30 hours total usage',   category: 'hat',     color: '#8B6914' },
      // Glasses
      { id: 'hornRimmed', name: 'Horn-rimmed',  nameKo: '뿔테안경',    unlock: '3+ concurrent sessions',  category: 'glasses', color: '#2D1B00' },
      { id: 'sunglasses', name: 'Sunglasses',   nameKo: '선글라스',    unlock: '10 rate limit hits',      category: 'glasses', color: '#1A1A1A' },
      { id: 'roundGlasses',name:'Round Glasses', nameKo: '둥근안경',   unlock: '20 long sessions (45m+)', category: 'glasses', color: '#4A90D9' },
      { id: 'starGlasses', name: 'Star Glasses', nameKo: '별안경',     unlock: '10 hours on Opus',        category: 'glasses', color: '#F59E0B' },
    ];

    const grid = document.getElementById('accessory-grid');

    ACCESSORIES.forEach(accessory => {
      const card = document.createElement('div');
      card.className = 'pet-card';
      card.innerHTML = `
        <h3>${accessory.name}</h3>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem;">${accessory.nameKo}</p>
        <p style="font-size: 0.8rem; color: var(--text); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em;">${accessory.category}</p>
        <div style="margin: 0.75rem 0;">
          <canvas class="pixel-canvas" width="48" height="48"
            data-accessory="${accessory.id}" data-color="${accessory.color}"></canvas>
        </div>
        <div class="unlock-condition">Unlock: ${accessory.unlock}</div>
      `;
      grid.appendChild(card);
    });

    // Render pixel art previews on canvases
    document.querySelectorAll('.pixel-canvas').forEach(canvas => {
      const ctx = canvas.getContext('2d');
      // Background
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, 48, 48);

      const color = canvas.dataset.color || '#D97757';
      const accessoryId = canvas.dataset.accessory;

      // Draw Clawd base (simple silhouette in #D97757)
      ctx.fillStyle = '#D97757';
      ctx.fillRect(14, 16, 20, 18); // body
      ctx.fillRect(18, 10, 12, 10); // head

      // Draw accessory on top
      ctx.fillStyle = color;
      if (accessoryId === 'cap' || accessoryId === 'cowboyHat' || accessoryId === 'silkHat' || accessoryId === 'santaHat' || accessoryId === 'partyHat') {
        // Hat styles — brim
        ctx.fillRect(15, 9, 18, 3);
        // Crown varies by hat
        if (accessoryId === 'partyHat') {
          // Tall pointed hat
          ctx.fillRect(21, 2, 6, 8);
        } else if (accessoryId === 'silkHat') {
          // Tall cylinder
          ctx.fillRect(18, 3, 12, 7);
        } else if (accessoryId === 'santaHat') {
          // Tapered hat
          ctx.fillRect(20, 4, 8, 6);
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(16, 10, 16, 2); // white brim stripe
          ctx.fillRect(26, 2, 4, 4);   // white pompom
        } else if (accessoryId === 'cowboyHat') {
          // Wide brim + crown
          ctx.fillRect(18, 4, 12, 6);
          ctx.fillRect(12, 10, 24, 2); // extra wide brim
        } else {
          // Cap brim
          ctx.fillRect(18, 4, 12, 6);
          ctx.fillStyle = '#1A1A1A';
          ctx.fillRect(15, 10, 10, 2); // peak
        }
      } else {
        // Glasses styles
        if (accessoryId === 'sunglasses') {
          ctx.fillRect(17, 18, 6, 4);
          ctx.fillRect(25, 18, 6, 4);
          ctx.fillRect(23, 19, 2, 2); // bridge
        } else if (accessoryId === 'starGlasses') {
          // Star shapes approximated as squares with corner accents
          ctx.fillRect(17, 17, 6, 6);
          ctx.fillRect(25, 17, 6, 6);
          ctx.fillRect(23, 19, 2, 2); // bridge
          ctx.fillStyle = '#FFFFFF';
          ctx.fillRect(18, 18, 2, 2); // star highlight
          ctx.fillRect(26, 18, 2, 2);
        } else {
          // Round/horn-rimmed — simple circle approximation
          ctx.fillRect(17, 17, 6, 6);
          ctx.fillRect(25, 17, 6, 6);
          ctx.fillRect(23, 19, 2, 2); // bridge
          ctx.fillStyle = '#1a1a2e';
          ctx.fillRect(18, 18, 4, 4); // lens cutout
          ctx.fillRect(26, 18, 4, 4);
          ctx.fillStyle = color;
          ctx.fillRect(19, 19, 2, 2); // frame detail
          ctx.fillRect(27, 19, 2, 2);
        }
      }
    });
  </script>
</body>
</html>
